# Codecov config. Coverage is tracked per app via flags (api / mobile) so each
# app's README can show its own badge. It's informational only — never gates CI
# or PRs (see docs: coverage is a proxy, weight the dangerous code, don't block).
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# Go's coverage profile lists files by full import path; strip the module prefix
# so they map onto the repo tree (apps/api/...). The mobile lcov is relative to
# apps/mobile and the uploader prefixes it from the report dir, so it's already
# correct.
fixes:
  - 'github.com/MorrisMorrison/granite/apps/api/::apps/api/'

# Exclude code that isn't meaningfully unit-tested so the % reflects business
# logic: app entrypoints (main + the embeddable app.Run bootstrap — config/db/http
# wiring, exercised by the e2e suite; its only logic, gateOrDefault, is unit-tested),
# generated sqlc, SQL migrations, the logger setup, and the embedded-SPA file-server
# glue. (The api job runs with -coverpkg=./... so cross-package coverage — e.g. the
# sync package exercised by the server tests — is credited rather than showing as 0%.)
ignore:
  - 'apps/api/cmd/**'
  - 'apps/api/app/**'
  - 'apps/api/internal/db/sqlc/**'
  - 'apps/api/internal/db/migrations/**'
  - 'apps/api/internal/logging/**'
  - 'apps/api/internal/webui/**'
  # Mobile: SvelteKit route screens are exercised by the Playwright e2e suite, not
  # unit tests (vitest collects coverage from src/lib/** only — see vite.config.ts);
  # the testable logic lives in src/lib (repos, analytics, components).
  - 'apps/mobile/src/routes/**'

# Per-app flags. No path filter: each flag is scoped by its own CI upload (the
# api job uploads the Go profile, the web job the mobile lcov), so they never
# overlap. carryforward keeps a flag's last value on commits that didn't re-upload
# it (e.g. a PR touching only the other app).
flags:
  api:
    carryforward: true
  mobile:
    carryforward: true

# Dashboard breakdown that mirrors the flags.
component_management:
  individual_components:
    - component_id: api
      name: API (Go)
      paths:
        - apps/api/**
    - component_id: mobile
      name: Web (SvelteKit)
      paths:
        - apps/mobile/**

comment:
  layout: 'reach, diff, flags, components'
  require_changes: true
