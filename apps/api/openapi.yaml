components:
  schemas:
    APIToken:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/APIToken.json
          format: uri
          readOnly: true
          type: string
        created_at:
          format: int64
          type: integer
        expires_at:
          format: int64
          type:
            - integer
            - "null"
        id:
          type: string
        last_used_at:
          format: int64
          type:
            - integer
            - "null"
        name:
          type: string
        prefix:
          type: string
        scopes:
          items:
            type: string
          type:
            - array
            - "null"
        token:
          type: string
      required:
        - id
        - name
        - prefix
        - scopes
        - last_used_at
        - expires_at
        - created_at
      type: object
    ApiChange:
      additionalProperties: false
      properties:
        data: {}
        deleted:
          type: boolean
        entity:
          type: string
        id:
          type: string
        updated_at:
          description: Record's last-modified time (epoch ms); the LWW key.
          format: int64
          type: integer
      required:
        - entity
        - id
        - updated_at
        - deleted
        - data
      type: object
    AuthOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/AuthOutputBody.json
          format: uri
          readOnly: true
          type: string
        access:
          type: string
        refresh:
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"
      required:
        - user
        - access
        - refresh
      type: object
    CreateTokenInputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateTokenInputBody.json
          format: uri
          readOnly: true
          type: string
        expires_at:
          description: Optional expiry (epoch ms); omit for no expiry.
          format: int64
          type: integer
        name:
          description: A label to identify the token.
          type: string
        scopes:
          description: "Access scopes: omit for read-only, or [\"write\"] for read+write."
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - name
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    Exercise:
      additionalProperties: false
      properties:
        exercise_id:
          type: string
        id:
          type: string
        notes:
          type: string
        order_index:
          format: int64
          type: integer
        rest_seconds:
          format: int64
          type: integer
        sets:
          items:
            $ref: "#/components/schemas/Set"
          type:
            - array
            - "null"
        superset_group:
          format: int64
          type:
            - integer
            - "null"
      required:
        - id
        - exercise_id
        - order_index
        - notes
        - rest_seconds
        - superset_group
        - sets
      type: object
    ExerciseBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ExerciseBody.json
          format: uri
          readOnly: true
          type: string
        equipment:
          type: string
        exercise_type:
          enum:
            - weight_reps
            - reps_only
            - duration
          type: string
        instructions:
          type: string
        is_archived:
          type: boolean
        name:
          maxLength: 200
          minLength: 1
          type: string
        primary_muscle:
          type: string
        secondary_muscles:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - name
        - exercise_type
      type: object
    ExerciseInput:
      additionalProperties: false
      properties:
        exercise_id:
          type: string
        notes:
          type: string
        rest_seconds:
          format: int64
          type: integer
        sets:
          items:
            $ref: "#/components/schemas/SetInput"
          type:
            - array
            - "null"
        superset_group:
          format: int64
          type: integer
      required:
        - exercise_id
      type: object
    ExerciseResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ExerciseResponse.json
          format: uri
          readOnly: true
          type: string
        created_at:
          format: int64
          type: integer
        equipment:
          type: string
        exercise_type:
          type: string
        id:
          type: string
        instructions:
          type: string
        is_archived:
          type: boolean
        is_builtin:
          type: boolean
        name:
          type: string
        primary_muscle:
          type: string
        secondary_muscles:
          items:
            type: string
          type:
            - array
            - "null"
        updated_at:
          format: int64
          type: integer
      required:
        - id
        - name
        - exercise_type
        - primary_muscle
        - secondary_muscles
        - equipment
        - instructions
        - is_archived
        - is_builtin
        - created_at
        - updated_at
      type: object
    ExportOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ExportOutputBody.json
          format: uri
          readOnly: true
          type: string
        exercises:
          items:
