name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - run: go vet ./...
      - run: go build ./...
      # One run produces both the JUnit report (Test Analytics) and the coverage
      # profile. -coverpkg=./... credits cross-package coverage (e.g. the sync
      # package is exercised by the server tests, not actually 0%).
      - run: go run gotest.tools/gotestsum@latest --junitfile junit.xml -- -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: apps/api/coverage.out
          flags: api
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: apps/api/junit.xml
          flags: api
          token: ${{ secrets.CODECOV_TOKEN }}

  web:
    name: Web (SvelteKit + shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm -r build
        env:
          # Lets the Codecov Vite plugin upload mobile bundle stats during the build.
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - run: corepack pnpm -r --if-present check
      - run: corepack pnpm -r test
      - run: corepack pnpm -C apps/mobile exec vitest run --coverage --reporter=default --reporter=junit --outputFile.junit=junit.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: apps/mobile/coverage/lcov.info
          flags: mobile
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: apps/mobile/junit.xml
          flags: mobile
          token: ${{ secrets.CODECOV_TOKEN }}

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build the production image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: UI e2e (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: corepack pnpm --filter mobile exec playwright install --with-deps chromium
      - name: Run e2e
        run: corepack pnpm --filter mobile e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/mobile/playwright-report
          retention-days: 7
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: apps/mobile/junit.xml
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}

  screenshots:
    name: README screenshots
    # Captures README screenshots from a demo-data instance. Runs on PRs too (to
    # verify the pipeline), but only *publishes* on main. Screenshots are force-pushed
    # to a dedicated `screenshots` branch (the README points at its raw URLs), never to
    # main — so main stays strictly PR-protected with no bypass exceptions, and the
    # README still refreshes on every main build.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: corepack pnpm --filter mobile exec playwright install --with-deps chromium
      - name: Capture screenshots
        run: corepack pnpm --filter mobile screenshots
      - name: Publish to the screenshots branch
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd docs/screenshots
          git init -q -b screenshots
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./*.png
          git commit -q -m "screenshots @ ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" screenshots

  openapi:
    name: OpenAPI client up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: make gen-client
      - name: Verify the committed spec + client are up to date
        run: git diff --exit-code apps/api/openapi.yaml packages/shared/src/api/schema.d.ts
