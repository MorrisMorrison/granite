name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  web:
    name: Web (SvelteKit + shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm -r build
      - run: corepack pnpm -r --if-present check
      - run: corepack pnpm -r test

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build the production image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: UI e2e (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: corepack pnpm --filter mobile exec playwright install --with-deps chromium
      - name: Run e2e
        run: corepack pnpm --filter mobile e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/mobile/playwright-report
          retention-days: 7

  openapi:
    name: OpenAPI client up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: make gen-client
      - name: Verify the committed spec + client are up to date
        run: git diff --exit-code apps/api/openapi.yaml packages/shared/src/api/schema.d.ts
