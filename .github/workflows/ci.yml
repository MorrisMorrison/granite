name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on a PR; let main runs finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  api:
    name: API (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache: true
          cache-dependency-path: apps/api/go.sum
      - run: go vet ./...
      - run: go build ./...
      # One run produces both the JUnit report (Test Analytics) and the coverage
      # profile. -coverpkg=./... credits cross-package coverage (e.g. the sync
      # package is exercised by the server tests, not actually 0%).
      - run: go run gotest.tools/gotestsum@latest --junitfile junit.xml -- -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: apps/api/coverage.out
          flags: api
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: apps/api/junit.xml
          flags: api
          token: ${{ secrets.CODECOV_TOKEN }}

  web:
    name: Web (SvelteKit + shared)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm -r build
        env:
          # Lets the Codecov Vite plugin upload mobile bundle stats during the build.
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - run: corepack pnpm -r --if-present check
      # shared's unit tests. Mobile is run once below (with coverage), so it's
      # excluded here to avoid running the mobile suite twice.
      - run: corepack pnpm --filter '!mobile' -r test
      - run: corepack pnpm -C apps/mobile exec vitest run --coverage --reporter=default --reporter=junit --outputFile.junit=junit.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: apps/mobile/coverage/lcov.info
          flags: mobile
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: apps/mobile/junit.xml
          flags: mobile
          token: ${{ secrets.CODECOV_TOKEN }}

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build the production image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: UI e2e (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache: true
          cache-dependency-path: apps/api/go.sum
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: corepack pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: corepack pnpm --filter mobile exec playwright install --with-deps chromium
      - name: Run e2e
        run: corepack pnpm --filter mobile e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/mobile/playwright-report
          retention-days: 7
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          files: apps/mobile/junit.xml
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}

  openapi:
    name: OpenAPI client up-to-date
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache: true
          cache-dependency-path: apps/api/go.sum
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: corepack pnpm install --frozen-lockfile
      - run: make gen-client
      - name: Verify the committed spec + client are up to date
        run: git diff --exit-code apps/api/openapi.yaml packages/shared/src/api/schema.d.ts
